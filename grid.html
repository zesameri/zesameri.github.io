<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>24x24 Grid</title>
  <style>
    body { padding: 16px; }
    table { border-collapse: collapse; }
    td { width: 22px; height: 22px; border: 1px solid #ccc; }
    .silver { background-color: #C0C0C0; }
  </style>
</head>
<body>
  <table id="grid"></table>
  <script>
    const SILVER_INDICES = new Set([0,2,4,6,8,10,13,15,17,19,21,23]);
    const table = document.getElementById('grid');
    for (let r = 0; r < 24; r++) {
      const tr = document.createElement('tr');
      for (let c = 0; c < 24; c++) {
        const td = document.createElement('td');
        if (SILVER_INDICES.has(r) || SILVER_INDICES.has(c)) {
          td.classList.add('silver');
        }
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }
  </script>
</body>
</html>
